apiVersion: v1
kind: Pod
metadata:
  name: cottage-manager
  labels:
    app: cottage-manager
spec:
  containers:
    - name: cottage-manager
      image: cottage-manager:latest
      imagePullPolicy: IfNotPresent
      ports:
        - containerPort: 8080
          name: http
      env:
        - name: LOG_LEVEL
          value: info
        - name: LOG_FORMAT
          value: json
